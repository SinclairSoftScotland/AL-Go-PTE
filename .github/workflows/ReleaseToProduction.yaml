name: Release to Production NuGet

run-name: "Release to Production NuGet - ${{ inputs.buildVersion }}"

concurrency:
  group: ${{ github.workflow }}-build-${{ inputs.buildVersion }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      buildVersion:
        description: Build version to deliver to Production (default is latest UAT build)
        required: false
        default: 'latest'

permissions:
  actions: read
  contents: write
  id-token: write
  pull-requests: write

defaults:
  run:
    shell: pwsh

env:
  ALGoOrgSettings: ${{ vars.ALGoOrgSettings }}
  ALGoRepoSettings: ${{ vars.ALGoRepoSettings }}

jobs:
  CreateProdRelease:
    runs-on: [ self-hosted, Windows, al-go ]
    outputs:
      releaseId: ${{ steps.createrelease.outputs.releaseId }}
      telemetryScopeJson: ${{ steps.init.outputs.telemetryScopeJson }}
      resolvedBuildVersion: ${{ steps.version.outputs.resolvedBuildVersion }}
    steps:
      - name: Dump Workflow Information
        uses: microsoft/AL-Go-Actions/DumpWorkflowInfo@v8.3
        with:
          shell: powershell

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Determine version source + read version from app.json
        id: version
        run: |
          $ErrorActionPreference = 'Stop'

          # Ensure tags/refs exist locally
          git fetch --force --tags --prune origin

          $ghHeaders = @{
            "Authorization" = "token ${{ github.token }}"
            "Accept"        = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          # Production releases always promote from the latest UAT release.
          # releases/latest only returns non-prerelease releases; UAT releases are
          # prerelease:true, so list releases and find the most recent *-uat tag.
          $url = "https://api.github.com/repos/${{ github.repository }}/releases?per_page=20"
          $releases = Invoke-RestMethod -Headers $ghHeaders -Uri $url -Method Get
          $latestUat = $releases | Where-Object { $_.prerelease -eq $true -and $_.tag_name -like '*-uat' } | Select-Object -First 1

          if (-not $latestUat) {
            throw "No UAT prerelease found (looked for releases tagged '*-uat'). Run 'Release to UAT NuGet' first."
          }

          $ref = "refs/tags/$($latestUat.tag_name)"
          Write-Host "Promoting UAT release: $($latestUat.tag_name)"

          # Read app.json from the chosen ref WITHOUT checking it out
          $appJsonRaw = git show "$ref`:app.json"
          if (-not $appJsonRaw) {
            throw "Could not read app.json from ref '$ref'."
          }

          $appJson = $appJsonRaw | ConvertFrom-Json
          $version = [string]$appJson.version

          if (-not $version) { throw "app.json at ref '$ref' does not have a version." }
          if ($version -notmatch '^\d+\.\d+\.\d+\.\d+$') {
            throw "Version '$version' is not in expected format Major.Minor.Build.Revision (e.g. 27.0.1.0)."
          }

          # IMPORTANT:
          # AL-Go CreateReleaseNotes expects SemVer (3 numeric segments). Your app.json is BC-style (4 segments).
          # For production git tags + release notes, we will use SemVer base (Major.Minor.Build).
          $parts = $version.Split('.')
          $semver = "$($parts[0]).$($parts[1]).$($parts[2])"  # e.g. 27.0.3

          $refSha = (git rev-parse $ref).Trim()

          # Auto-discover the build version by inspecting the actual artifacts
          # produced by the CI/CD run at this commit. This is more reliable than
          # constructing the version from run_number, because the artifact name
          # is the ground truth (it includes branch name, offsets, etc.).
          $runsUrl = "https://api.github.com/repos/${{ github.repository }}/actions/runs?head_sha=$refSha&per_page=20"
          $runsResp = Invoke-RestMethod -Headers $ghHeaders -Uri $runsUrl -Method Get

          Write-Host "All runs at commit $refSha :"
          $runsResp.workflow_runs | ForEach-Object {
            Write-Host "  run#$($_.run_number)  id=$($_.id)  event='$($_.event)'  status='$($_.status)'  conclusion='$($_.conclusion)'  name='$($_.name)'  path='$($_.path)'"
          }

          # Prefer the CICD workflow with a successful conclusion; fall back to any successful run.
          $ciRun = $runsResp.workflow_runs |
            Where-Object { $_.conclusion -eq 'success' -and ($_.path -like '*CICD*' -or $_.name -like '*CI/CD*') } |
            Select-Object -First 1

          if (-not $ciRun) {
            $ciRun = $runsResp.workflow_runs |
              Where-Object { $_.conclusion -eq 'success' } |
              Select-Object -First 1
            if ($ciRun) {
              Write-Host "⚠️ CICD workflow not matched by name — using first successful run: '$($ciRun.name)' ($($ciRun.path))"
            }
          }

          if (-not $ciRun) {
            throw "Could not find any successful workflow run for commit $refSha (ref: $ref). Ensure CI/CD completed successfully for this ref."
          }

          # Query the artifacts produced by that specific CI/CD run and extract
          # the version from the Apps artifact name (e.g. test10-main-Apps-27.0.5.15).
          $runArtifactsUrl = "https://api.github.com/repos/${{ github.repository }}/actions/runs/$($ciRun.id)/artifacts?per_page=30"
          $runArtifacts = Invoke-RestMethod -Headers $ghHeaders -Uri $runArtifactsUrl -Method Get

          Write-Host "Artifacts from CI/CD run $($ciRun.id) :"
          $runArtifacts.artifacts | ForEach-Object { Write-Host "  $($_.name)" }

          $appsArtifact = $runArtifacts.artifacts | Where-Object { $_.name -like '*-Apps-*' } | Select-Object -First 1
          if (-not $appsArtifact) {
            throw "No Apps artifact found in CI/CD run $($ciRun.id). Artifacts may have expired (shortLivedArtifactsRetentionDays=$($settings.shortLivedArtifactsRetentionDays)). Re-run CI/CD and try again."
          }

          # Extract the version suffix from the artifact name: {repo}-{branch}-Apps-{version}
          $resolvedBuildVersion = ($appsArtifact.name -split '-Apps-')[1]
          Write-Host "Resolved build version from artifact '$($appsArtifact.name)': $resolvedBuildVersion"

          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "TAG=$semver" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "RELEASE_NAME=$semver" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "VERSION_REF=$ref" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "VERSION_REF_SHA=$refSha" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "RESOLVED_BUILD_VERSION=$resolvedBuildVersion" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          # Also expose as a step output so it can be declared as a job output
          # and consumed by the DeliverToProdNuGet job.
          "resolvedBuildVersion=$resolvedBuildVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          Write-Host "APP_VERSION=$version"
          Write-Host "Version source ref:  $ref"
          Write-Host "Version source SHA:  $refSha"
          Write-Host "TAG=$semver"

      - name: Initialize the workflow
        id: init
        uses: microsoft/AL-Go-Actions/WorkflowInitialize@v8.3
        with:
          shell: powershell

      - name: Read settings
        uses: microsoft/AL-Go-Actions/ReadSettings@v8.3
        with:
          shell: powershell

      - name: Read secrets
        id: ReadSecrets
        uses: microsoft/AL-Go-Actions/ReadSecrets@v8.3
        with:
          shell: powershell
          gitHubSecrets: ${{ toJson(secrets) }}
          # Format: outputKey=SecretName — reads NUGETPRODCONTEXT secret, exposes as nuGetContext
          getSecrets: 'TokenForPush,nuGetContext=NUGETPRODCONTEXT'

      - name: Validate Production NuGet feed context is configured
        run: |
          $ErrorActionPreference = 'Stop'
          $secrets = '${{ steps.ReadSecrets.outputs.Secrets }}' | ConvertFrom-Json

          if (-not $secrets.nuGetContext) {
            throw "NuGet Prod context is missing. Ensure secret 'NUGETPRODCONTEXT' is set on this repo."
          }

          # AL-Go ReadSecrets base64-encodes secret values inside the Secrets JSON
          $ctxJson = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($secrets.nuGetContext))
          $ctx = $ctxJson | ConvertFrom-Json
          if (-not $ctx.serverUrl) { throw "NuGet Prod context has no serverUrl. Check 'NUGETPRODCONTEXT' secret JSON." }
          if (-not $ctx.token) { throw "NuGet Prod context has no token. Check 'NUGETPRODCONTEXT' secret JSON." }

          Write-Host "✅ Prod feed configured: $($ctx.serverUrl)"

      - name: Determine Projects
        id: determineProjects
        uses: microsoft/AL-Go-Actions/DetermineProjectsToBuild@v8.3
        with:
          shell: powershell

      - name: Prepare release notes
        id: createreleasenotes
        uses: microsoft/AL-Go-Actions/CreateReleaseNotes@v8.3
        with:
          shell: powershell
          buildVersion: ${{ env.RESOLVED_BUILD_VERSION }}
          tag_name: ${{ env.TAG }}
          target_commitish: ${{ env.VERSION_REF_SHA }}

      - name: Create Production GitHub release
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        id: createrelease
        env:
          bodyMD: ${{ steps.createreleasenotes.outputs.releaseNotes }}
          tag_name: ${{ env.TAG }}
          name: ${{ env.RELEASE_NAME }}
          commitish: ${{ env.VERSION_REF_SHA }}
        with:
          github-token: ${{ steps.ReadSecrets.outputs.TokenForPush }}
          script: |
            var bodyMD = process.env.bodyMD
            const createReleaseResponse = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.tag_name,
              name: process.env.name,
              body: bodyMD.replaceAll('\\n','\n').replaceAll('%0A','\n').replaceAll('%0D','\n').replaceAll('%25','%'),
              draft: false,
              prerelease: false,
              make_latest: true,
              target_commitish: process.env.commitish
            });
            const { data: { id: releaseId } } = createReleaseResponse;
            core.setOutput('releaseId', releaseId);

  DeliverToProdNuGet:
    needs: [ CreateProdRelease ]
    runs-on: [ self-hosted, Windows, al-go ]
    name: Deliver to Production NuGet
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read settings
        uses: microsoft/AL-Go-Actions/ReadSettings@v8.3
        with:
          shell: powershell

      - name: Read secrets
        id: ReadSecrets
        uses: microsoft/AL-Go-Actions/ReadSecrets@v8.3
        with:
          shell: powershell
          gitHubSecrets: ${{ toJson(secrets) }}
          # Format: outputKey=SecretName — reads NUGETPRODCONTEXT secret, exposes as nuGetContext
          getSecrets: 'TokenForPush,nuGetContext=NUGETPRODCONTEXT'

      - name: Validate Production NuGet feed context is configured
        run: |
          $ErrorActionPreference = 'Stop'
          $secrets = '${{ steps.ReadSecrets.outputs.Secrets }}' | ConvertFrom-Json

          if (-not $secrets.nuGetContext) {
            throw "NuGet Prod context is missing. Ensure secret 'NUGETPRODCONTEXT' is set on this repo."
          }

          # AL-Go ReadSecrets base64-encodes secret values inside the Secrets JSON
          $ctxJson = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($secrets.nuGetContext))
          $ctx = $ctxJson | ConvertFrom-Json
          if (-not $ctx.serverUrl) { throw "NuGet Prod context has no serverUrl. Check 'NUGETPRODCONTEXT' secret JSON." }
          if (-not $ctx.token) { throw "NuGet Prod context has no token. Check 'NUGETPRODCONTEXT' secret JSON." }

          Write-Host "✅ Prod feed configured: $($ctx.serverUrl)"

      - name: Deliver to Production NuGet feed
        uses: microsoft/AL-Go-Actions/Deliver@v8.3
        if: ${{ fromJson(steps.ReadSecrets.outputs.Secrets).nuGetContext != '' }}
        env:
          Secrets: ${{ steps.ReadSecrets.outputs.Secrets }}
        with:
          shell: powershell
          type: 'Release'
          projects: '.'
          deliveryTarget: 'NuGet'
          artifacts: ${{ needs.CreateProdRelease.outputs.resolvedBuildVersion }}
          atypes: 'Apps,TestApps'

  PostProcess:
    needs: [ CreateProdRelease, DeliverToProdNuGet ]
    if: always()
    runs-on: [ self-hosted, Windows, al-go ]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Finalize the workflow
        uses: microsoft/AL-Go-Actions/WorkflowPostProcess@v8.3
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          shell: powershell
          telemetryScopeJson: ${{ needs.CreateProdRelease.outputs.telemetryScopeJson }}
          currentJobContext: ${{ toJson(job) }}
