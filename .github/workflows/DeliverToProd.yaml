name: Release to Production NuGet

run-name: "Deliver to Production NuGet - ${{ inputs.buildVersion }} (${{
  inputs.versionSource }})"

concurrency:
  group: ${{ github.workflow }}-build-${{ inputs.buildVersion }}-src-${{ inputs.versionSource }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      buildVersion:
        description: Build version to deliver to Production (default is latest)
        required: false
        default: 'latest'
      versionSource:
        description: Where to read app.json version from (controls tag/release version)
        required: true
        type: choice
        options:
          - main
          - latest-release
        default: main

permissions:
  actions: read
  contents: write
  id-token: write
  pull-requests: write

defaults:
  run:
    shell: powershell

env:
  ALGoOrgSettings: ${{ vars.ALGoOrgSettings }}
  ALGoRepoSettings: ${{ vars.ALGoRepoSettings }}

jobs:
  CreateProdRelease:
    runs-on: [ windows-latest ]
    outputs:
      artifacts: ${{ steps.determineArtifactsForRelease.outputs.artifacts }}
      releaseId: ${{ steps.createrelease.outputs.releaseId }}
      telemetryScopeJson: ${{ steps.init.outputs.telemetryScopeJson }}
    steps:
      - name: Dump Workflow Information
        uses: microsoft/AL-Go-Actions/DumpWorkflowInfo@v8.3
        with:
          shell: powershell

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Determine version source + read version from app.json
        id: version
        run: |
          $ErrorActionPreference = 'Stop'

          # Ensure tags/refs exist locally
          git fetch --force --tags --prune origin

          $source = "${{ inputs.versionSource }}".Trim()

          if ($source -eq "main") {
            $ref = "origin/main"
          }
          elseif ($source -eq "latest-release") {
            $headers = @{
              "Authorization" = "token ${{ github.token }}"
              "Accept"        = "application/vnd.github+json"
              "X-GitHub-Api-Version" = "2022-11-28"
            }

            $url = "https://api.github.com/repos/${{ github.repository }}/releases/latest"
            $resp = Invoke-RestMethod -Headers $headers -Uri $url -Method Get
            if (-not $resp.tag_name) {
              throw "No latest GitHub release tag found (releases/latest returned no tag_name)."
            }

            $ref = "refs/tags/$($resp.tag_name)"
            Write-Host "Latest GitHub release tag: $($resp.tag_name)"
          }
          else {
            throw "Unknown versionSource '$source'."
          }

          # Read app.json from the chosen ref WITHOUT checking it out
          $appJsonRaw = git show "$ref`:app.json"
          if (-not $appJsonRaw) {
            throw "Could not read app.json from ref '$ref'."
          }

          $appJson = $appJsonRaw | ConvertFrom-Json
          $version = [string]$appJson.version

          if (-not $version) { throw "app.json at ref '$ref' does not have a version." }
          if ($version -notmatch '^\d+\.\d+\.\d+\.\d+$') {
            throw "Version '$version' is not in expected format Major.Minor.Build.Revision (e.g. 27.0.1.0)."
          }

          $tag = $version
          $refSha = (git rev-parse $ref).Trim()

          "TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "RELEASE_NAME=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "VERSION_REF=$ref" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "VERSION_REF_SHA=$refSha" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          Write-Host "Version source ref:  $ref"
          Write-Host "Version source SHA:  $refSha"
          Write-Host "TAG=$tag"

      - name: Initialize the workflow
        id: init
        uses: microsoft/AL-Go-Actions/WorkflowInitialize@v8.3
        with:
          shell: powershell

      - name: Read settings
        uses: microsoft/AL-Go-Actions/ReadSettings@v8.3
        with:
          shell: powershell

      - name: Read secrets
        id: ReadSecrets
        uses: microsoft/AL-Go-Actions/ReadSecrets@v8.3
        with:
          shell: powershell
          gitHubSecrets: ${{ toJson(secrets) }}
          # NuGetProdContext is mapped to name: Deliver to Production NuGet

