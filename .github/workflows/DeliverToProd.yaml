  inputs.versionSource }})"

concurrency:
  group: ${{ github.workflow }}-build-${{ inputs.buildVersion }}-src-${{ inputs.versionSource }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      buildVersion:
        description: Build version to deliver to Production (default is latest)
        required: false
        default: 'latest'
