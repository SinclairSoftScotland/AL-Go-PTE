        description: Where to read app.json version from (controls tag/release version)
        required: true
        type: choice
        options:
          - main
          - latest-release
        default: main

permissions:
  actions: read
  contents: write
  id-token: write
  pull-requests: write

defaults:
  run:
    shell: powershell

env:
  ALGoOrgSettings: ${{ vars.ALGoOrgSettings }}
  ALGoRepoSettings: ${{ vars.ALGoRepoSettings }}

jobs:
  CreateProdRelease:
    runs-on: [ windows-latest ]
    outputs:
      artifacts: ${{ steps.determineArtifactsForRelease.outputs.artifacts }}
      releaseId: ${{ steps.createrelease.outputs.releaseId }}
      telemetryScopeJson: ${{ steps.init.outputs.telemetryScopeJson }}
    steps:
      - name: Dump Workflow Information
        uses: microsoft/AL-Go-Actions/DumpWorkflowInfo@v8.3
        with:
          shell: powershell

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Determine version source + read version from app.json
        id: version
        run: |
          $ErrorActionPreference = 'Stop'

          # Ensure tags/refs exist locally
          git fetch --force --tags --prune origin

          $source = "${{ inputs.versionSource }}".Trim()

          if ($source -eq "main") {
            $ref = "origin/main"
          }
          elseif ($source -eq "latest-release") {
            $headers = @{
              "Authorization" = "token ${{ github.token }}"
              "Accept"        = "application/vnd.github+json"
              "X-GitHub-Api-Version" = "2022-11-28"
            }

            $url = "https://api.github.com/repos/${{ github.repository }}/releases/latest"
            $resp = Invoke-RestMethod -Headers $headers -Uri $url -Method Get
            if (-not $resp.tag_name) {
              throw "No latest GitHub release tag found (releases/latest returned no tag_name)."
            }

            $ref = "refs/tags/$($resp.tag_name)"
            Write-Host "Latest GitHub release tag: $($resp.tag_name)"
          }
          else {
            throw "Unknown versionSource '$source'."
          }

          # Read app.json from the chosen ref WITHOUT checking it out
          $appJsonRaw = git show "$ref`:app.json"
          if (-not $appJsonRaw) {
            throw "Could not read app.json from ref '$ref'."
          }

          $appJson = $appJsonRaw | ConvertFrom-Json
          $version = [string]$appJson.version

          if (-not $version) { throw "app.json at ref '$ref' does not have a version." }
          if ($version -notmatch '^\d+\.\d+\.\d+\.\d+$') {
            throw "Version '$version' is not in expected format Major.Minor.Build.Revision (e.g. 27.0.1.0)."
          }

          $tag = $version
          $refSha = (git rev-parse $ref).Trim()

          "TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "RELEASE_NAME=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "VERSION_REF=$ref" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "VERSION_REF_SHA=$refSha" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          Write-Host "Version source ref:  $ref"
          Write-Host "Version source SHA:  $refSha"
          Write-Host "TAG=$tag"

      - name: Initialize the workflow
        id: init
        uses: microsoft/AL-Go-Actions/WorkflowInitialize@v8.3
        with:
          shell: powershell

      - name: Read settings
        uses: microsoft/AL-Go-Actions/ReadSettings@v8.3
        with:
          shell: powershell

      - name: Read secrets
        id: ReadSecrets
        uses: microsoft/AL-Go-Actions/ReadSecrets@v8.3
        with:
          shell: powershell
          gitHubSecrets: ${{ toJson(secrets) }}
          # NuGetProdContext is mapped to nuGetContext so AL-Go Deliver action picks it up
          getSecrets: 'TokenForPush,NuGetProdContext=nuGetContext'

      - name: Determine Projects
        id: determineProjects
        uses: microsoft/AL-Go-Actions/DetermineProjectsToBuild@v8.3
        with:
          shell: powershell

      - name: Determine artifacts for release
        id: determineArtifactsForRelease
        uses: microsoft/AL-Go-Actions/DetermineArtifactsForRelease@v8.3
        with:
          shell: powershell
          buildVersion: ${{ github.event.inputs.buildVersion }}
          GITHUB_TOKEN: ${{ github.token }}
          TOKENFORPUSH: ${{ steps.ReadSecrets.outputs.TokenForPush }}
          ProjectsJson: ${{ steps.determineProjects.outputs.ProjectsJson }}

      - name: Safety check - build artifacts must match version source ref
        run: |
          $ErrorActionPreference = 'Stop'

          $versionSha  = "${{ env.VERSION_REF_SHA }}".Trim()
          $commitishIn = "${{ steps.determineArtifactsForRelease.outputs.commitish }}".Trim()

          if ([string]::IsNullOrWhiteSpace($commitishIn)) {
            throw "DetermineArtifactsForRelease did not output commitish."
          }

          $versionFull = (git rev-parse $versionSha).Trim()
          $artFull     = (git rev-parse $commitishIn).Trim()

          Write-Host "Version source SHA:  $versionFull"
          Write-Host "Artifacts full SHA:  $artFull"

          if ($versionFull -ne $artFull) {
            $msg = @(
              "Safety check failed: selected buildVersion '${{ inputs.buildVersion }}' does not match versionSource '${{ inputs.versionSource }}'."
              ""
              "- versionSource ref SHA: $versionFull"
              "- build artifacts SHA:   $artFull"
              ""
              "Pick the correct buildVersion (or rebuild) and try again."
            ) -join "`n"
            throw $msg
          }

          Write-Host "✅ Safety check passed."

      - name: Prepare release notes
        id: createreleasenotes
        uses: microsoft/AL-Go-Actions/CreateReleaseNotes@v8.3
        with:
          shell: powershell
          buildVersion: ${{ github.event.inputs.buildVersion }}
          tag_name: ${{ env.TAG }}
          target_commitish: ${{ steps.determineArtifactsForRelease.outputs.commitish }}

      - name: Create Production GitHub release
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        id: createrelease
        env:
          bodyMD: ${{ steps.createreleasenotes.outputs.releaseNotes }}
          tag_name: ${{ env.TAG }}
          name: ${{ env.RELEASE_NAME }}
          commitish: ${{ steps.determineArtifactsForRelease.outputs.commitish }}
        with:
          github-token: ${{ steps.ReadSecrets.outputs.TokenForPush }}
          script: |
            var bodyMD = process.env.bodyMD
            const createReleaseResponse = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.tag_name,
              name: process.env.name,
              body: bodyMD.replaceAll('\\n','\n').replaceAll('%0A','\n').replaceAll('%0D','\n').replaceAll('%25','%'),
              draft: false,
              prerelease: false,
              make_latest: true,
              target_commitish: process.env.commitish
            });
            const { data: { id: releaseId } } = createReleaseResponse;
            core.setOutput('releaseId', releaseId);

  DeliverToProdNuGet:
    needs: [ CreateProdRelease ]
    runs-on: [ windows-latest ]
    name: Deliver ${{ matrix.name }} to Production NuGet
    strategy:
      matrix: ${{ fromJson(needs.CreateProdRelease.outputs.artifacts) }}
      fail-fast: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read settings
        uses: microsoft/AL-Go-Actions/ReadSettings@v8.3
        with:
          shell: powershell

      - name: Read secrets
        id: ReadSecrets
        uses: microsoft/AL-Go-Actions/ReadSecrets@v8.3
        with:
          shell: powershell
          gitHubSecrets: ${{ toJson(secrets) }}
          getSecrets: 'TokenForPush,NuGetProdContext=nuGetContext'

      - name: Download artifact
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MATRIX_NAME: ${{ matrix.name }}
          MATRIX_URL: ${{ matrix.url }}
        run: |
          $errorActionPreference = "Stop"; $ProgressPreference = "SilentlyContinue"; Set-StrictMode -Version 2.0
          Write-Host "Downloading artifact $ENV:MATRIX_NAME"
          $headers = @{
            "Authorization" = "token $ENV:GITHUB_TOKEN"
            "X-GitHub-Api-Version" = "2022-11-28"
            "Accept" = "application/vnd.github+json"
          }
          Invoke-WebRequest -UseBasicParsing -Headers $headers -Uri $ENV:MATRIX_URL -OutFile "$($ENV:MATRIX_NAME).zip"

      - name: Deliver to Production NuGet feed
        uses: microsoft/AL-Go-Actions/Deliver@v8.3
        if: ${{ fromJson(steps.ReadSecrets.outputs.Secrets).name: Deliver to Production NuGet

