name: Auto Increment Version

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'app.json'        # avoid triggering on our own bump commit
      - '**.md'
      - '.github/**'
      - '.AL-Go/**'

concurrency:
  group: auto-version-${{ github.ref }}
  cancel-in-progress: true

jobs:
  increment-version:
    name: Increment Build Version
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ghTokenWorkflow }}

      - name: Increment build number in app.json
        shell: pwsh
        run: |
          $appJsonPath = "app.json"
          $appJson = Get-Content $appJsonPath -Raw | ConvertFrom-Json
          $current = [System.Version]$appJson.version
          $newVersion = "{0}.{1}.{2}.0" -f $current.Major, $current.Minor, ($current.Build + 1)
          $appJson.version = $newVersion
          $appJson | ConvertTo-Json -Depth 10 | Set-Content $appJsonPath -Encoding UTF8
          Write-Host "Version bumped: $current -> $newVersion"
          echo "NEW_VERSION=$newVersion" >> $env:GITHUB_ENV

      - name: Commit and push
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.json
          git commit -m "[skip ci] Increment build version to ${{ env.NEW_VERSION }}"
          git push
