run-name: "Release to UAT - ${{ inputs.buildVersion }}"

concurrency:
  group: ${{ github.workflow }}-build-${{ inputs.buildVersion }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      buildVersion:
        description: Build version to promote to UAT (default is latest)
        required: false
        default: 'latest'

permissions:
  actions: read
  contents: write
  id-token: write
  pull-requests: write

defaults:
  run:
    shell: powershell

env:
  ALGoOrgSettings: ${{ vars.ALGoOrgSettings }}
  ALGoRepoSettings: ${{ vars.ALGoRepoSettings }}

jobs:
  ReleaseToUAT:
    runs-on: [ windows-latest ]
    outputs:
      artifacts: ${{ steps.determineArtifactsForRelease.outputs.artifacts }}
      releaseId: ${{ steps.createrelease.outputs.releaseId }}
      telemetryScopeJson: ${{ steps.init.outputs.telemetryScopeJson }}
    steps:
      - name: Dump Workflow Information
        uses: microsoft/AL-Go-Actions/DumpWorkflowInfo@v8.3
        with:
          shell: powershell

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read version from app.json (and record current commit)
        id: appversion
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Test-Path -Path "app.json")) {
            throw "app.json not found at repository root."
          }

          $appJson = Get-Content -Path "app.json" -Raw | ConvertFrom-Json
          if (-not $appJson.version) {
            throw "app.json does not contain a 'version' property."
          }

          $version = [string]$appJson.version
          if ($version -notmatch '^\d+\.\d+\.\d+\.\d+$') {
            throw "Version '$version' is not in expected format Major.Minor.Build.Revision (e.g. 27.0.1.0)."
          }

          $tag = "$version-uat"
          $repoSha = (git rev-parse HEAD).Trim()

          "TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "RELEASE_NAME=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "REPO_SHA=$repoSha" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          Write-Host "Using TAG=$tag"
          Write-Host "Repo SHA: $repoSha"

      - name: Initialize the workflow
        id: init
        uses: microsoft/AL-Go-Actions/WorkflowInitialize@v8.3
        with:
          shell: powershell

      - name: Read settings
        uses: microsoft/AL-Go-Actions/ReadSettings@v8.3
        with:
          shell: powershell

      - name: Read secrets
        id: ReadSecrets
        uses: microsoft/AL-Go-Actions/ReadSecrets@v8.3
        with:
          shell: powershell
          gitHubSecrets: ${{ toJson(secrets) }}
          # NuGetUATContext is mapped to nuGetContext so AL-Go Deliver action picks it up
          getSecrets: 'TokenForPush,NuGetUATContext=nuGetContext'

      - name: Determine Projects
        id: determineProjects
        uses: microsoft/AL-Go-Actions/DetermineProjectsToBuild@v8.3
        with:
          shell: powershell

      - name: Determine artifacts for release
        id: determineArtifactsForRelease
        uses: microsoft/AL-Go-Actions/DetermineArtifactsForRelease@v8.3
        with:
          shell: powershell
          buildVersion: ${{ github.event.inputs.buildVersion }}
          GITHUB_TOKEN: ${{ github.token }}
          TOKENFORPUSH: ${{ steps.ReadSecrets.outputs.TokenForPush }}
          ProjectsJson: ${{ steps.determineProjects.outputs.ProjectsJson }}

      - name: Safety check - build artifacts must match current main/app.json commit
        id: safetycheck
        run: |
          $ErrorActionPreference = 'Stop'

          $repoSha     = "${{ env.REPO_SHA }}".Trim()
          $commitishIn = "${{ steps.determineArtifactsForRelease.outputs.commitish }}".Trim()

          if ([string]::IsNullOrWhiteSpace($commitishIn)) {
            throw "DetermineArtifactsForRelease did not output commitish."
          }

          $repoFull = (git rev-parse $repoSha).Trim()
          $artFull  = (git rev-parse $commitishIn).Trim()

          Write-Host "Repo full SHA:       $repoFull"
          Write-Host "Artifacts commitish: $commitishIn"
          Write-Host "Artifacts full SHA:  $artFull"

          if ($repoFull -ne $artFull) {
            throw @"
            Safety check failed: selected buildVersion '${{ github.event.inputs.buildVersion }}' points to a different commit than the checked-out repository.
            
            - app.json came from: $repoFull
            - build artifacts are from: $artFull
            
            This prevents accidentally releasing an older (or different) build.
            Pick the correct buildVersion (or rebuild) and try again.
            "@
          }

          Write-Host "✅ Safety check passed: artifacts match app.json commit."

      - name: Prepare release notes
        id: createreleasenotes
        uses: microsoft/AL-Go-Actions/CreateReleaseNotes@v8.3
        with:
          shell: powershell
          buildVersion: ${{ github.event.inputs.buildVersion }}
          tag_name: ${{ env.TAG }}
          target_commitish: ${{ steps.determineArtifactsForRelease.outputs.commitish }}

      - name: Create UAT GitHub prerelease
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        id: createrelease
        env:
          bodyMD: ${{ steps.createreleasenotes.outputs.releaseNotes }}
          tag_name: ${{ env.TAG }}
          name: ${{ env.RELEASE_NAME }}
          commitish: ${{ steps.determineArtifactsForRelease.outputs.commitish }}
        with:
          github-token: ${{ steps.ReadSecrets.outputs.TokenForPush }}
          script: |
            var bodyMD = process.env.bodyMD
            const createReleaseResponse = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.tag_name,
              name: process.env.name,
              body: bodyMD.replaceAll('\\n','\n').replaceAll('%0A','\n').replaceAll('%0D','\n').replaceAll('%25','%'),
              draft: false,
              prerelease: true,
              make_latest: false,
              target_commitish: process.env.commitish
            });
            const { data: { id: releaseId } } = createReleaseResponse;
            core.setOutput('releaseId', releaseId);

  DeliverToUATNuGet:
    needs: [ ReleaseToUAT ]
    runs-on: [ windows-latest ]
    name: Deliver ${{ matrix.name }} to UAT NuGet
    strategy:
      matrix: ${{ fromJson(needs.ReleaseToUAT.outputs.artifacts) }}
      fail-fast: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read settings
        uses: microsoft/AL-Go-Actions/ReadSettings@v8.3
        with:
          shell: powershell

      - name: Read secrets
        id: ReadSecrets
        uses: microsoft/AL-Go-Actions/ReadSecrets@v8.3
        with:
          shell: powershell
          gitHubSecrets: ${{ toJson(secrets) }}
          getSecrets: 'TokenForPush,NuGetUATContext=nuGetContext'

      - name: Download artifact
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MATRIX_NAME: ${{ matrix.name }}
          MATRIX_URL: ${{ matrix.url }}
        run: |
          $errorActionPreference = "Stop"; $ProgressPreference = "SilentlyContinue"; Set-StrictMode -Version 2.0
          Write-Host "Downloading artifact $ENV:MATRIX_NAME"
          $headers = @{
            "Authorization" = "token $ENV:GITHUB_TOKEN"
            "X-GitHub-Api-Version" = "2022-11-28"
            "Accept" = "application/vnd.github+json"
          }
          Invoke-WebRequest -UseBasicParsing -Headers $headers -Uri $ENV:MATRIX_URL -OutFile "$($ENV:MATRIX_NAME).zip"

      - name: Deliver to UAT NuGet feed
        uses: microsoft/AL-Go-Actions/Deliver@v8.3
        if: ${{ fromJson(steps.ReadSecrets.outputs.Secrets).nuGetContext != '' }}
        env:
          Secrets: ${{ steps.ReadSecrets.outputs.Secrets }}
        with:
          shell: powershell
          type: 'Release'
          projects: ${{ matrix.project }}
          deliveryTarget: 'NuGet'
          artifacts: ${{ github.event.inputs.buildVersion }}
          atypes: 'Apps,TestApps'

  PostProcess:
    needs: [ ReleaseToUAT, DeliverToUATNuGet ]
    if: always()
    runs-on: [ windows-latest ]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Finalize the workflow
        uses: microsoft/AL-Go-Actions/WorkflowPostProcess@v8.3
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          shell: powershell
          telemetryScopeJson: ${{ needs.ReleaseToUAT.outputs.telemetryScopeJson }}
          currentJobContext: ${{ toJson(job) }}
